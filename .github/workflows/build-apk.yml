name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Generate platform scaffolding
        run: |
          flutter create --project-name launchpad --platforms android /tmp/launchpad_tmp
          rm -rf android
          cp -a /tmp/launchpad_tmp/android .

      - run: flutter pub get

      - name: Build debug APK (self-signed)
        run: flutter build apk --debug

      - name: Generate self-signed release keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Launchpad, OU=Dev, O=Launchpad, L=City, ST=State, C=US"

      - name: Build release APK (self-signed)
        run: |
          echo "storePassword=android" > android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=release" >> android/key.properties
          echo "storeFile=../../release.keystore" >> android/key.properties
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: launchpad-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: launchpad-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
