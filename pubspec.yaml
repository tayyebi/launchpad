publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  dio: ^5.4.3+1
  fl_chart: ^0.68.0
  connectivity_plus: ^6.0.3
