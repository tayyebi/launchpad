name: launchpad
description: A launchpad-style time tracker.
publish_to: 'none'
version: 1.6.0

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  dio: ^5.4.3+1
  fl_chart: ^0.68.0
  connectivity_plus: ^6.0.3
  go_router: ^14.2.0
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_animate: ^4.5.0
  flutter_native_splash: ^2.4.0
  google_fonts: ^6.2.1
  wakelock_plus: ^1.2.8
  home_widget: ^0.7.0
  reorderable_grid_view: ^2.2.8
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#121212"
  color_dark: "#121212"
  android_12:
    color: "#121212"
    color_dark: "#121212"
